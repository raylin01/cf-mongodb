services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: unless-stopped
    command: ["--config", "/etc/mongod.conf"]
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - ./data/mongo:/data/db
      - ./mongod.conf:/etc/mongod.conf
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks:
      - mongodb-net
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USER}", "-p", "${MONGO_ROOT_PASSWORD}", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build: ./dashboard
    container_name: mongodb-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:3000"
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_HOST: mongodb
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./.cloudflare.json:/app/.cloudflare.json:ro
    networks:
      - mongodb-net
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  mongodb-net:
    driver: bridge
